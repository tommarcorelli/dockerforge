<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- DockerForge icon: baleine Docker stylisée sur une enclume avec étincelle forge -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2496ED"/>
      <stop offset="55%" stop-color="#1a75c2"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="forge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD27A"/>
      <stop offset="45%" stop-color="#EE7D3D"/>
      <stop offset="100%" stop-color="#B94A16"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFC97A" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#EE7D3D" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#EE7D3D" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Fond arrondi -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Halo forge -->
  <circle cx="356" cy="180" r="120" fill="url(#glow)"/>

  <!-- Enclume (base) -->
  <g fill="#0b1220" opacity="0.35">
    <rect x="120" y="380" width="272" height="26" rx="6"/>
  </g>
  <g fill="#0b1220">
    <path d="M108 322 L404 322 Q416 322 416 334 L416 356 Q416 368 404 368 L108 368 Q96 368 96 356 L96 334 Q96 322 108 322 Z"/>
    <path d="M148 288 L364 288 Q376 288 372 300 L360 320 L152 320 L140 300 Q136 288 148 288 Z"/>
    <rect x="228" y="220" width="56" height="72" rx="6"/>
  </g>

  <!-- Baleine Docker (conteneurs empilés) -->
  <g fill="#ffffff">
    <!-- rangée basse : 4 conteneurs -->
    <rect x="140" y="170" width="44" height="42" rx="4"/>
    <rect x="188" y="170" width="44" height="42" rx="4"/>
    <rect x="236" y="170" width="44" height="42" rx="4"/>
    <rect x="284" y="170" width="44" height="42" rx="4"/>
    <!-- rangée mid : 3 conteneurs -->
    <rect x="188" y="124" width="44" height="42" rx="4"/>
    <rect x="236" y="124" width="44" height="42" rx="4"/>
    <rect x="284" y="124" width="44" height="42" rx="4"/>
    <!-- rangée haut : 1 conteneur -->
    <rect x="236" y="78" width="44" height="42" rx="4"/>
    <!-- corps baleine base -->
    <path d="M120 212 L360 212 Q392 212 392 244 Q392 268 366 268 L136 268 Q108 268 108 244 Q108 212 120 212 Z"/>
    <!-- nageoire -->
    <path d="M362 240 L406 220 Q416 232 402 252 L376 262 Z"/>
    <!-- œil -->
    <circle cx="342" cy="238" r="3.5" fill="#0b1220"/>
  </g>

  <!-- Marteau (forge accent) -->
  <g>
    <rect x="332" y="70" width="12" height="120" rx="4" fill="#5a3a1a" transform="rotate(28 338 130)"/>
    <rect x="300" y="46" width="80" height="42" rx="6" fill="url(#forge)" transform="rotate(28 340 67)"/>
    <!-- Étincelles -->
    <circle cx="392" cy="112" r="6" fill="#FFD27A"/>
    <circle cx="408" cy="140" r="4" fill="#FFB84D"/>
    <circle cx="378" cy="88" r="3" fill="#FFEBB0"/>
  </g>
</svg>
